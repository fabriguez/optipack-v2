services:
  # ---------- API Express.js ----------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - optipack

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: optipack
      POSTGRES_USER: optipack
      POSTGRES_PASSWORD: optipack
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optipack"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - optipack

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - optipack

  # ---------- MinIO (S3-compatible storage) ----------
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: optipack
      MINIO_ROOT_PASSWORD: optipack_secret
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - optipack


volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  optipack:
    driver: bridge
