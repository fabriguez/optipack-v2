version: "3.9"

# Control Plane stack pour OptiPack SaaS
# - orchestrator API (Express, port 4020)
# - ops_admin Postgres (BDD séparée des tenants)
# - Redis (BullMQ pour les jobs de provisioning)
# Le frontend ops-admin (Next.js) sera ajouté en Phase 5.

services:
  ops-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OPS_POSTGRES_USER:-opsadmin}
      POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${OPS_POSTGRES_DB:-ops_admin}
    volumes:
      - ops-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPS_POSTGRES_USER:-opsadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-plane

  ops-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ops-redis-data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-plane

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      ops-postgres:
        condition: service_healthy
      ops-redis:
        condition: service_healthy
    # Bridge mode : ops-postgres/ops-redis joignables par nom de service via le
    # network compose. Pour atteindre Caddy (sur l'host), on passe par
    # host.docker.internal mappe a la gateway grace a host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Pas de mount socket docker ni de bind /host-ssh : le provisioning self
    # passe par SSH normal (loopback). L'admin enregistre le VPS self avec
    # une cle privee SSH dont la pub est dans ~/.ssh/authorized_keys du user
    # host. Le user host doit avoir sudo NOPASSWD pour les commandes docker.
    environment:
      NODE_ENV: production
      OPS_PORT: 4020
      OPS_DATABASE_URL: postgresql://${OPS_POSTGRES_USER:-opsadmin}:${OPS_POSTGRES_PASSWORD}@ops-postgres:5432/${OPS_POSTGRES_DB:-ops_admin}
      OPS_REDIS_URL: redis://ops-redis:6379
      OPS_JWT_SECRET: ${OPS_JWT_SECRET:?required}
      OPS_MASTER_KEY: ${OPS_MASTER_KEY:?required}
      OPS_TOTP_ISSUER: ${OPS_TOTP_ISSUER:-TransitSoftServices Ops}
      OPS_GHCR_NAMESPACE: ${OPS_GHCR_NAMESPACE:-transitsoftservices}
      OPS_GHCR_TOKEN: ${OPS_GHCR_TOKEN}
      OPS_PUBLIC_WEB_URL: ${OPS_PUBLIC_WEB_URL:-https://ops-admin.transitsoftservices.com}
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://host.docker.internal:2019}
      # Origin envoye dans les requetes a l admin API Caddy. http://localhost
      # est toujours accepte par Caddy (defaut) meme sans config prealable,
      # ce qui resout le bootstrap : avant le premier push, Caddy n a pas
      # encore notre liste d origines custom (orchestrator/host.docker.internal).
      CADDY_ADMIN_ORIGIN: ${CADDY_ADMIN_ORIGIN:-http://localhost}
      OPS_SELF_VPS_NAME: ${OPS_SELF_VPS_NAME:-self}
      # Chemin du Caddyfile du host self, tel que monte dans le conteneur (cf.
      # volumes). L'orchestrateur y merge la region OPTIPACK-MANAGED.
      CADDY_SELF_FILE: ${CADDY_SELF_FILE:-/etc/caddy/Caddyfile}
      # Routes statiques additionnelles preservees a chaque reconcile (format
      # host=upstream, virgule). Si set, REMPLACE le defaut ops/ops-admin -> re-
      # inclure ops + ops-admin. Ex : whatsapp, s3, storage.
      CADDY_STATIC_ROUTES: ${CADDY_STATIC_ROUTES:-}
      OPS_BASE_DOMAIN: ${OPS_BASE_DOMAIN:-transitsoftservices.com}
      OPS_CADDY_EMAIL: ${OPS_CADDY_EMAIL:-admin@transitsoftservices.com}
      # Token partage orchestrator <-> tenant API pour ops-sync + reset-pwd.
      # Sans ce token, le sync silencieux + reset pwd renvoient 503.
      OPS_TENANT_PROXY_TOKEN: ${OPS_TENANT_PROXY_TOKEN:?required for tenant ops-sync + reset-owner-password}
      # Dir host pour fichiers compose/env/seed tenant (provisioning self).
      OPS_TENANT_ENV_DIR: ${OPS_TENANT_ENV_DIR:-/home/brightky/.optipack}
      # Resend partage (fallback si tenant n'a pas son propre provider).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      # Postgres pwd / Minio creds pour le compose tenant.
      POSTGRES_USER: ${OPS_POSTGRES_USER:-opsadmin}
      POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:-}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
      # Seed idempotent au boot. Laisser true en permanence sans risque.
      OPS_RUN_SEED: ${OPS_RUN_SEED:-false}
      SEED_OPS_ADMIN_EMAIL: ${SEED_OPS_ADMIN_EMAIL:-admin@transitsoftservices.com}
      SEED_OPS_ADMIN_PASSWORD: ${SEED_OPS_ADMIN_PASSWORD:-changeme-in-production}
      SEED_OPS_ADMIN_NAME: ${SEED_OPS_ADMIN_NAME:-Ops Super Admin}
      SEED_OPS_ADMIN_TOTP_SECRET: ${SEED_OPS_ADMIN_TOTP_SECRET:-}
      SEED_MAIN_TENANT: ${SEED_MAIN_TENANT:-false}
      SEED_MAIN_TENANT_SLUG: ${SEED_MAIN_TENANT_SLUG:-main}
      SEED_MAIN_TENANT_NAME: ${SEED_MAIN_TENANT_NAME:-OptiPack Main Tenant}
      SEED_MAIN_TENANT_EMAIL: ${SEED_MAIN_TENANT_EMAIL:-}
      SEED_MAIN_TENANT_API_PORT: ${SEED_MAIN_TENANT_API_PORT:-3009}
      SEED_MAIN_TENANT_WEB_PORT: ${SEED_MAIN_TENANT_WEB_PORT:-3008}
      SEED_MAIN_TENANT_WEB_CLIENT_PORT: ${SEED_MAIN_TENANT_WEB_CLIENT_PORT:-3010}
      SEED_SELF_VPS_HOST: ${SEED_SELF_VPS_HOST:-127.0.0.1}
      SEED_SELF_VPS_NAME: ${SEED_SELF_VPS_NAME:-self}
    ports:
      - "127.0.0.1:4020:4020"
    volumes:
      # Bind-mount du Caddyfile de l'host (self) : l'orchestrateur (root dans le
      # conteneur) lit/merge/ecrit /etc/caddy/Caddyfile SANS sudo ni SSH, puis
      # recharge via l'admin API (host.docker.internal:2019). Le fichier sur
      # disque reste la source de verite -> survit au restart de Caddy.
      - /etc/caddy:/etc/caddy
    networks:
      - control-plane

  ops-admin:
    build:
      context: .
      dockerfile: docker/ops-admin/Dockerfile.prod
      args:
        # URL publique de l'orchestrator API, inlinee dans le bundle JS au build.
        NEXT_PUBLIC_ORCHESTRATOR_URL: ${OPS_PUBLIC_API_URL:-https://ops.transitsoftservices.com}
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3020
    ports:
      - "127.0.0.1:3020:3020"
    networks:
      - control-plane

volumes:
  ops-postgres-data:
  ops-redis-data:

networks:
  control-plane:
    driver: bridge
