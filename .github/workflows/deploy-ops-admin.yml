name: Deploy ops-admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/ops-admin/**'
      - 'packages/**'
      - 'docker/ops-admin/**'
      - '.github/workflows/deploy-ops-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ops-admin to control plane
    runs-on: ubuntu-latest

    steps:
      - name: Sync code on control plane VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OPS_CONTROL_PLANE_HOST }}
          username: ${{ secrets.OPS_CONTROL_PLANE_USER }}
          key: ${{ secrets.OPS_CONTROL_PLANE_SSH_KEY }}
          script: |
            set -e
            if [ ! -d ~/optipack-v2/.git ]; then
              mkdir -p ~/optipack-v2
              git -C ~/optipack-v2 init -b main
              git -C ~/optipack-v2 remote add origin https://github.com/${{ github.repository }}.git
            fi
            cd ~/optipack-v2
            git remote prune origin || true
            rm -f .git/refs/remotes/origin/main.lock 2>/dev/null || true
            if ! git fetch origin main --force --prune; then
              git update-ref -d refs/remotes/origin/main 2>/dev/null || true
              git gc --prune=now 2>/dev/null || true
              git fetch origin main --force --prune
            fi
            git reset --hard origin/main

      - name: Build & restart ops-admin container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OPS_CONTROL_PLANE_HOST }}
          username: ${{ secrets.OPS_CONTROL_PLANE_USER }}
          key: ${{ secrets.OPS_CONTROL_PLANE_SSH_KEY }}
          command_timeout: 30m
          envs: ORCHESTRATOR_URL
          script: |
            set -e
            cd ~/optipack-v2
            docker build \
              --build-arg NEXT_PUBLIC_ORCHESTRATOR_URL="$ORCHESTRATOR_URL" \
              -t ops-admin:latest \
              -f docker/ops-admin/Dockerfile.prod \
              .
            docker network create optipack-shared || true
            docker stop ops-admin || true
            docker rm ops-admin || true
            docker ps -q --filter publish=3020 | xargs -r docker stop || true
            docker ps -aq --filter publish=3020 | xargs -r docker rm || true
            docker run -d --name ops-admin \
              --restart unless-stopped \
              --network optipack-shared \
              -p 3020:3020 \
              -e PORT=3020 \
              ops-admin:latest
            docker image prune -f
        env:
          ORCHESTRATOR_URL: ${{ secrets.OPS_ORCHESTRATOR_URL }}
