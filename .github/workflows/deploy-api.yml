name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'packages/config/**'
      - 'docker/api/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy API to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            if [ ! -d ~/optipack-v2/.git ]; then
              mkdir -p ~/optipack-v2
              git -C ~/optipack-v2 init -b main
              git -C ~/optipack-v2 remote add origin https://github.com/${{ github.repository }}.git
            fi
            cd ~/optipack-v2

            # Sync resilient : `git pull` echoue parfois avec
            # "cannot lock ref 'refs/remotes/origin/main'" quand la ref locale
            # est desynchronisee de packed-refs (fetch interrompu, gc concurrent).
            # On purge la ref locale puis on force-fetch + hard reset.
            git remote prune origin || true
            rm -f .git/refs/remotes/origin/main.lock 2>/dev/null || true
            if ! git fetch origin main --force --prune; then
              git update-ref -d refs/remotes/origin/main 2>/dev/null || true
              git gc --prune=now 2>/dev/null || true
              git fetch origin main --force --prune
            fi
            git reset --hard origin/main

            # Ensure postgres is up
            docker compose -f docker-compose.prod.yml up -d postgres

            # Build api image
            docker compose -f docker-compose.prod.yml build api

            # Start (or restart) api -- entrypoint runs migrations + seed before booting
            docker compose -f docker-compose.prod.yml up -d api

            docker image prune -f
