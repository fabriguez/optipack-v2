name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'packages/config/**'
      - 'docker/api/**'
      - 'docker-compose.prod.yml'

jobs:
  deploy:
    name: Deploy API to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/optipack-v2
            git pull origin main

            # Ensure postgres is up
            docker compose -f docker-compose.prod.yml up -d postgres

            # Build api + migrate images
            docker compose -f docker-compose.prod.yml --profile migrate build api api-migrate

            # Run migrations + seed (one-shot, exits when done)
            docker compose -f docker-compose.prod.yml --profile migrate run --rm api-migrate

            # Start (or restart) api
            docker compose -f docker-compose.prod.yml up -d api

            docker image prune -f
