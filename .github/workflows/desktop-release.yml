name: Desktop — build installers (Win + Mac)

# Declenchement : workflow_dispatch uniquement (bouton "Run workflow" sur GitHub).
# - Laisser "version" vide  -> patch auto (0.1.0 -> 0.1.1)
# - Remplir "version"       -> utilise la valeur fournie (ex: 0.2.0)
#
# La CI :
#   1. Bumpe tauri.conf.json + commit [skip ci] sur main
#   2. Compile Win (.msi / .exe NSIS) + Mac (.dmg universel)
#   3. Publie une Release GitHub desktop-vX.Y.Z avec les binaires en assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version a publier (ex: 0.2.0). Laisser vide = patch auto.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version & bump tauri.conf.json
        id: bump
        run: |
          CURRENT=$(node -p "require('./apps/web-desktop/src-tauri/tauri.conf.json').version")
          INPUT="${{ inputs.version }}"
          if [ -n "$INPUT" ]; then
            NEW="$INPUT"
          else
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "Version: $CURRENT -> $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          node -e "
            const fs = require('fs');
            const p = 'apps/web-desktop/src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          " "$NEW"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web-desktop/src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore(release): bump desktop to v$NEW [skip ci]"
          git push

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web-desktop/src-tauri

      - name: Install workspace deps
        run: pnpm install --no-frozen-lockfile

      - name: Build + bundle (tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.transitsoftservices.com/api/v1' }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'https://api.transitsoftservices.com' }}
          # Signature macOS desactivee. Pour activer : ajouter
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID dans les secrets du repo.
        with:
          projectPath: apps/web-desktop
          args: ${{ matrix.args }}
          tagName: desktop-v${{ needs.prepare.outputs.version }}
          releaseName: 'TransitSoft Desktop v${{ needs.prepare.outputs.version }}'
          releaseBody: 'Installeurs desktop. Win: .exe (NSIS) / .msi · Mac: .dmg (universel).'
          releaseDraft: false
          prerelease: false
