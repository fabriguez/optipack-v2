name: Build & push Docker images to GHCR

# Phase 0.5 : build des images optipack-api, optipack-web et optipack-web-client
# et push vers GHCR prive.
#
# Versioning : toute image poussee est taguee `beta-1.0.<n>` ou <n> provient
# de `apps/all/version`. Le job `bump-version` incremente ce compteur avant
# chaque build, puis committe le nouveau numero (avec `[skip ci]` pour eviter
# une boucle de workflow).

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/optipack-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/optipack-web
  WEB_CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/optipack-web-client

jobs:
  bump-version:
    name: Bump image version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Bump beta version
        id: bump
        run: |
          set -e
          VERSION_FILE=apps/all/version
          if [ ! -f "$VERSION_FILE" ]; then
            echo "0" > "$VERSION_FILE"
          fi
          CURRENT=$(tr -d '[:space:]' < "$VERSION_FILE")
          if ! [[ "$CURRENT" =~ ^[0-9]+$ ]]; then
            echo "Invalid version content: '$CURRENT'" >&2
            exit 1
          fi
          NEXT=$((CURRENT + 1))
          printf '%s\n' "$NEXT" > "$VERSION_FILE"
          TAG="beta-1.0.$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Bumped image version: $CURRENT -> $NEXT (tag $TAG)"

      - name: Commit & push bumped version
        if: github.event_name != 'pull_request'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/all/version
          if git diff --cached --quiet; then
            echo "No version change to commit"
            exit 0
          fi
          git commit -m "chore(release): bump image tag to ${{ steps.bump.outputs.tag }} [skip ci]"
          # Push only when on a branch (skip on tag refs to avoid detached HEAD push failure).
          if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            git push origin "HEAD:${GITHUB_REF#refs/heads/}"
          else
            echo "Ref ${GITHUB_REF} is not a branch; skipping push of version bump."
          fi

  build-api:
    name: Build & push optipack-api
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull bumped version commit
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=${{ needs.bump-version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    name: Build & push optipack-web
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4 
        with:
          ref: ${{ github.ref }}

      - name: Pull bumped version commit
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sync locations (countries/cities JSON) depuis CDN avant le build
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache locations data
        id: cache-locations
        uses: actions/cache@v4
        with:
          path: apps/web/public/locations
          key: locations-data-v1

      - name: Sync locations
        if: steps.cache-locations.outputs.cache-hit != 'true'
        run: node apps/web/scripts/sync-locations.mjs

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=${{ needs.bump-version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* vars sont inlined dans le bundle JS au build time.
          # Pour le SaaS multi-tenant : URL relative, le frontend appelle
          # l'API du tenant via le sous-domaine api.<slug>.transitsoftservices.com
          # configure au runtime via window.location ou TenantProvider.
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_SOCKET_URL=
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  build-web-client:
    name: Build & push optipack-web-client
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull bumped version commit
        run: git pull --ff-only origin "${GITHUB_REF#refs/heads/}" || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_CLIENT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=${{ needs.bump-version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Web-Client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web-client/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Multi-tenant : l'URL d'API est configuree au runtime via l'env du
          # conteneur (NEXT_PUBLIC_API_URL injecte par l'orchestrator au
          # provision). Build-time fallback : URL relative.
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
          cache-from: type=gha,scope=web-client
          cache-to: type=gha,scope=web-client,mode=max
