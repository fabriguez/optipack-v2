name: Build & push Docker images to GHCR

# Phase 0.5 : build des images optipack-api et optipack-web et push vers GHCR prive
# Trigger : sur push de tag vX.Y.Z (releases) ET sur main (tag latest pour dev)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:  # build manuel possible depuis l'UI GitHub

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/optipack-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/optipack-web

jobs:
  build-api:
    name: Build & push optipack-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    name: Build & push optipack-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sync locations (countries/cities JSON) depuis CDN avant le build
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache locations data
        id: cache-locations
        uses: actions/cache@v4
        with:
          path: apps/web/public/locations
          key: locations-data-v1

      - name: Sync locations
        if: steps.cache-locations.outputs.cache-hit != 'true'
        run: node apps/web/scripts/sync-locations.mjs

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* vars sont inlined dans le bundle JS au build time.
          # Pour le SaaS multi-tenant : URL relative, le frontend appelle
          # l'API du tenant via le sous-domaine api.<slug>.transitsoftservices.com
          # configure au runtime via window.location ou TenantProvider.
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_SOCKET_URL=
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
