name: Deploy Orchestrator

# Deploie l'orchestrator (control plane) sur le VPS principal.
# Le VPS principal heberge a la fois l'orchestrator + le tenant principal
# (instance OptiPack du proprietaire du systeme). Les deux stacks coexistent :
#   - docker-compose.prod.yml         -> api + web + web-client (tenant principal)
#   - docker-compose.control-plane.yml -> orchestrator + ops-postgres + ops-redis
#
# Meme VPS, memes secrets SSH. Les autres tenants (clients SaaS) seront
# provisionnes par l'orchestrator sur ce VPS ou d'autres, via SSH.
#
# Les migrations Prisma sont jouees par l'entrypoint au boot du conteneur.

on:
  push:
    branches: [main]
    paths:
      - 'apps/orchestrator/**'
      - 'apps/ops-admin/**'
      - 'packages/shared/**'
      - 'packages/skins/**'
      - 'packages/ops-schemas/**'
      - 'packages/config/**'
      - 'docker/orchestrator/**'
      - 'docker/ops-admin/**'
      - 'docker-compose.control-plane.yml'
      - '.github/workflows/deploy-orchestrator.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy orchestrator to main VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/optipack-v2
            git pull origin main

            # S'assurer que la BDD ops + redis tournent (entrypoint orchestrator les attend)
            docker compose -f docker-compose.control-plane.yml up -d ops-postgres ops-redis

            # Build des images orchestrator + ops-admin (les deux vivent sur ce VPS
            # et sont definis dans la meme stack control-plane).
            docker compose -f docker-compose.control-plane.yml build orchestrator ops-admin

            # (Re)demarrage : l'entrypoint orchestrator joue prisma migrate deploy
            # avant de booter. ops-admin est un Next.js standalone -> demarrage direct.
            docker compose -f docker-compose.control-plane.yml up -d orchestrator ops-admin

            # Nettoyage des images orphelines
            docker image prune -f
