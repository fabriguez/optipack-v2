services:
  # ---------- API Express.js ----------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
    ports:
      # Bind localhost only -> Caddy (host) reverse-proxy via 127.0.0.1:3009.
      # Pas d'exposition directe sur internet : tout passe par Caddy + Let's Encrypt.
      - "127.0.0.1:3009:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transitsoftservices}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-transitsoftservices}?schema=public
      REDIS_URL: redis://redis:6379
      # Tenant PRINCIPAL : autorise le seed de demo/bootstrap (org + admin +
      # agences). Les tenants secondaires ne posent JAMAIS ce flag -> leur base
      # ne recoit pas l'org fantome ni les identifiants par defaut. Cf. seed.ts.
      SEED_DEMO_DATA: "true"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      # URL publique du MinIO : liens presignes notif-center/email. RECOMMANDEE.
      # Les pieces jointes WhatsApp ne l'exigent PLUS (envoi inline base64 depuis
      # le MinIO interne). Ex : https://s3.transitsoftservices.com.
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
    entrypoint: ["/bin/sh", "/usr/local/bin/api-entrypoint.sh"]
    command: ["node", "dist/index.js"]
    restart: unless-stopped
    # Total tenant principal vise : 4 Go RAM / 3 CPU. L'API porte le metier ;
    # le canal WhatsApp passe par l'API interne distante (plus de navigateur
    # embarque) : marge RAM/CPU liberee, limites revisables a la baisse.
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1844M
        reservations:
          memory: 768M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transitsoftservices

  # ---------- Web Next.js (staff dashboard) ----------
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    ports:
      - "127.0.0.1:3008:3000"
    env_file: .env
    environment:
      INTERNAL_API_URL: http://api:4000/api/v1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 500M
        reservations:
          memory: 256M
    networks:
      - transitsoftservices

  # ---------- Web-Client Next.js (public marketing site + client portal) ----------
  # Sous-domaine www.<slug>.<base> + customDomain (cf. CaddyService).
  web-client:
    build:
      context: .
      dockerfile: docker/web-client/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3010:3001"
    env_file: .env
    environment:
      INTERNAL_API_URL: http://api:4000/api/v1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M
        reservations:
          memory: 192M
    networks:
      - transitsoftservices

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transitsoftservices}
      POSTGRES_USER: ${POSTGRES_USER:-transitsoftservices}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transitsoftservices}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 700M
        reservations:
          memory: 300M
    networks:
      - transitsoftservices

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 368M
        reservations:
          memory: 128M
    networks:
      - transitsoftservices

  # ---------- MinIO ----------
  minio:
    image: minio/minio
    ports:
      - "127.0.0.1:9005:9000"
      - "127.0.0.1:9006:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-transitsoftservices}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 300M
        reservations:
          memory: 192M
    networks:
      - transitsoftservices

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  transitsoftservices:
    driver: bridge
