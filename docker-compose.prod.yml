services:
  # ---------- API Express.js ----------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
    ports:
      - "3009:4000"
    env_file: .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transitsoftservices

  # ---------- API migrate + seed (one-shot) ----------
  api-migrate:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
      target: builder
    env_file: .env
    working_dir: /app/apps/api
    command: sh -c "pnpm exec prisma migrate deploy && pnpm exec prisma db seed"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transitsoftservices
    profiles: ["migrate"]
    restart: "no"

  # ---------- Web Next.js ----------
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    ports:
      - "3008:3000"
    env_file: .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - transitsoftservices

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transitsoftservices}
      POSTGRES_USER: ${POSTGRES_USER:-transitsoftservices}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transitsoftservices}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - transitsoftservices

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - transitsoftservices

  # ---------- MinIO ----------
  minio:
    image: minio/minio
    ports:
      - "127.0.0.1:9005:9000"
      - "127.0.0.1:9006:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-transitsoftservices}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - transitsoftservices

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  transitsoftservices:
    driver: bridge
